# SonarQube Cloud (SonarCloud) configuration
# Read automatically by the SonarScanner from the base directory (code/).
#
# NOTE: The project identity and server settings (sonar.host.url,
# sonar.organization, sonar.projectKey, sonar.projectName) are intentionally
# NOT defined here. They are enforced from the CI workflow via -D command line
# arguments (which take precedence over this file) so they cannot be altered
# by editing this file.
#
# Dynamic values (projectVersion, branch / pull request scope) are also passed
# from the workflow via -D command line arguments.
# Docs: https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/scanners/sonarscanner-for-npm/configuring

# Source and test layout (monorepo packages, base dir = code/)
sonar.sources=packages
sonar.tests=packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Files excluded from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/reports/**,**/*.test-d.ts

# Files excluded from coverage computation
sonar.coverage.exclusions=**/__tests__/**,**/*.config.ts,**/vitest.setup.ts,packages/create-backend-app/**,packages/create-frontend-app/**

# Files excluded from duplication detection
sonar.cpd.exclusions=packages/create-backend-app/**/*,packages/create-frontend-app/**/*,**/tsdown.config.ts,**/vitest.config.ts,**/vitest.setup.ts,**/__tests__/**,**/*.test.ts

# Merged LCOV coverage report (relative to base dir = code/)
sonar.javascript.lcov.reportPaths=coverage/lcov.info


